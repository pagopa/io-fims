name: "io-fims"

services:
  # This is your primary development container
  app:
    image: "mcr.microsoft.com/devcontainers/base:debian@sha256:6155a486f236fd5127b76af33086029d64f64cf49dd504accb6e5f949098eb7e"
    # Keeps the container running so VS Code can attach to it
    command: sleep infinity
    # Optional but recommended: link it to redis so it waits for redis to start
    depends_on:
      - redis
    volumes:
      # Maps your local codebase (.) to the container's workspace folder
      # The :cached flag speeds up file reads on macOS/Windows
      - .:/workspaces/io-fims:cached

  redis:
    image: "redis/redis-stack:6.2.6-v19@sha256:93b5454f383821d7279373ff97fcaa48960cc543c53afe1471e2e2a97efee6df"
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      REDIS_ARGS: "--requirepass local"
